name: Daily analytics email

on:
  schedule:
    # Every day at 07:00 UTC
    - cron: "0 7 * * *"
  workflow_dispatch: {}

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r scripts/requirements.txt

      - run: python scripts/daily_report.py
        env:
          GOATCOUNTER_CODE: ${{ secrets.GOATCOUNTER_CODE }}
          GOATCOUNTER_API_TOKEN: ${{ secrets.GOATCOUNTER_API_TOKEN }}
          SITE_URL: "www.soufianebouarfa.com"
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
