<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <!-- Background -->
  <rect width="600" height="300" fill="#f8f9fa"/>

  <!-- Strategy Box -->
  <rect x="50" y="100" width="120" height="60" fill="#ffffff" stroke="#007bff" stroke-width="2" rx="8"/>
  <text x="110" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#007bff">Strategy</text>
  <text x="110" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">Intent & Goals</text>

  <!-- Systems Box -->
  <rect x="240" y="100" width="120" height="60" fill="#ffffff" stroke="#007bff" stroke-width="2" rx="8"/>
  <text x="300" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#007bff">Systems</text>
  <text x="300" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">Platforms & Data</text>

  <!-- Delivery Box -->
  <rect x="430" y="100" width="120" height="60" fill="#ffffff" stroke="#007bff" stroke-width="2" rx="8"/>
  <text x="490" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#007bff">Delivery</text>
  <text x="490" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">Operations</text>

  <!-- Arrows -->
  <line x1="170" y1="130" x2="240" y2="130" stroke="#007bff" stroke-width="3" marker-end="url(#arrowhead)"/>
  <line x1="360" y1="130" x2="430" y2="130" stroke="#007bff" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Governance Circle -->
  <circle cx="300" cy="200" r="40" fill="#ffffff" stroke="#007bff" stroke-width="3"/>
  <text x="300" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#007bff">Governance</text>

  <!-- Connecting Lines -->
  <line x1="110" y1="160" x2="110" y2="180" stroke="#007bff" stroke-width="2"/>
  <line x1="300" y1="160" x2="300" y2="180" stroke="#007bff" stroke-width="2"/>
  <line x1="490" y1="160" x2="490" y2="180" stroke="#007bff" stroke-width="2"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#007bff"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="300" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">Enterprise Architecture</text>
</svg>