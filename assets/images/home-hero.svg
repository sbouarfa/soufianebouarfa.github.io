<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#e6f0fc"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f6ff"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#4285f4"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <g fill="url(#box)" stroke="#d1e7ff" stroke-width="2" rx="8">
    <rect x="50" y="100" width="120" height="60"/>
    <rect x="240" y="100" width="120" height="60"/>
    <rect x="430" y="100" width="120" height="60"/>
  </g>
  <g fill="#0d47a1" font-family="Inter, Arial, sans-serif" text-anchor="middle" font-size="14" font-weight="600">
    <text x="110" y="125">Strategy</text>
    <text x="300" y="125">Systems</text>
    <text x="490" y="125">Delivery</text>
  </g>
  <g fill="#546e7a" font-size="12" text-anchor="middle">
    <text x="110" y="145">Intent & Goals</text>
    <text x="300" y="145">Platforms & Data</text>
    <text x="490" y="145">Operations</text>
  </g>
  <g fill="url(#arrow)" stroke="none">
    <polygon points="170,130 190,125 190,135"/>
    <polygon points="360,130 380,125 380,135"/>
  </g>
  <line x1="170" y1="130" x2="240" y2="130" stroke="url(#arrow)" stroke-width="3"/>
  <line x1="360" y1="130" x2="430" y2="130" stroke="url(#arrow)" stroke-width="3"/>
  <circle cx="300" cy="200" r="40" fill="#ffffff" stroke="#1a73e8" stroke-width="2"/>
  <text x="300" y="210" fill="#1a73e8" font-family="Inter, Arial, sans-serif" text-anchor="middle" font-size="14" font-weight="700">Governance</text>
  <g stroke="#1a73e8" stroke-width="2" fill="none">
    <line x1="300" y1="160" x2="300" y2="160"/>
    <line x1="300" y1="160" x2="300" y2="160"/>
    <line x1="300" y1="160" x2="300" y2="160"/>
  </g>
  <line x1="110" y1="160" x2="110" y2="180" stroke="#1a73e8" stroke-width="2"/>
  <line x1="300" y1="160" x2="300" y2="180" stroke="#1a73e8" stroke-width="2"/>
  <line x1="490" y1="160" x2="490" y2="180" stroke="#1a73e8" stroke-width="2"/>
  <text x="300" y="270" fill="#546e7a" font-family="Inter, Arial, sans-serif" text-anchor="middle" font-size="12">Enterprise Architecture</text>
</svg>